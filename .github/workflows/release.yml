name: Build & Release

on:
  push:
    branches:
      - master
    # Build & release only when something that affects the build, `make check` or
    # the resolved version actually changes. A push touching none of these paths
    # (e.g. docs-only) skips the whole workflow. Keep this list in sync with new
    # build inputs — an omitted path means no release on a real change.
    paths:
      - '**.php'                        # src, tests, bin, config, cs-fixer.dist.php
      - '**.go'                         # Go extension sources
      - 'ext/**'                        # go.mod / go.sum, headers, build scripts
      - 'composer.json'
      - 'composer.lock'
      - 'makefile'
      - 'ext-build.sh'
      - 'ext-test.sh'
      - 'phpstan.neon'
      - 'docker/**'
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/release.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + all tags: needed to resolve the previous version tag for
          # strict version-to-version release notes.
          fetch-depth: 0

      - name: Prepare environment
        run: cp .env.example .env

      - name: Build images
        run: make build

      - name: Start containers
        run: make up

      - name: Install composer dependencies
        run: make composer c="install --no-interaction --no-progress"

      - name: Build extension
        run: make ext-build

      - name: Run checks
        run: make check

      - name: Resolve release version
        id: version
        run: |
          status=$(docker compose exec -T php php -d extension=./ext/build/sconcur.so bin/sconcur-status --json)
          echo "sconcur-status: $status"

          ready=$(echo "$status" | jq -r '.ready')
          version=$(echo "$status" | jq -r '.extension_version')

          if [ "$ready" != "true" ] || [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::sconcur is not ready or its version is empty: $status"
            exit 1
          fi

          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"

          # Published version tags are immutable: moving a tag that Packagist (and
          # consumers) already resolved changes a released version's source reference,
          # which Packagist blocks. If the tag already exists on origin, this version was
          # already released — skip. To ship again, bump the version (the version lives in
          # one place and VersionConsistencyTest keeps the three copies in lockstep), which
          # produces a new tag on the next push.
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::notice::$tag already released; skipping. Bump the version to release again."
            exit 0
          fi

          # Previous version tag = the highest v* tag strictly below the current one, so
          # the notes cover strictly the previous version → this version. Empty on the
          # very first versioned release, where we let --generate-notes fall back to its
          # automatic base. (bkp/latest and other non-v tags are ignored.)
          previous_tag=$( { git tag -l 'v*'; echo "$tag"; } | sort -V -u \
            | awk -v current="$tag" '$0 == current { print previous; exit } { previous = $0 }' )

          notes_args=(--generate-notes)

          if [ -n "$previous_tag" ]; then
            echo "Generating notes from $previous_tag to $tag."
            notes_args+=(--notes-start-tag "$previous_tag")
          else
            echo "No previous version tag found; using automatic notes base."
          fi

          # Create the release once, tagging the current commit. The tag is never moved
          # afterwards (see the immutability guard above). --latest marks it as the GitHub
          # "Latest" release (what /releases/latest resolves to). --generate-notes
          # auto-builds the changelog from PRs/commits between previous_tag and this release.
          gh release create "$tag" ./ext/build/sconcur.so \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            "${notes_args[@]}" \
            --latest
