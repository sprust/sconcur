name: Build & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Prepare environment
        run: cp .env.example .env

      - name: Build images
        run: make build

      - name: Start containers
        run: make up

      - name: Install composer dependencies
        run: make composer c="install --no-interaction --no-progress"

      - name: Build extension
        run: make ext-build

      - name: Run checks
        run: make check

      - name: Resolve release version
        id: version
        run: |
          status=$(docker compose exec -T php php -d extension=./ext/build/sconcur.so bin/sconcur-status --json)
          echo "sconcur-status: $status"

          ready=$(echo "$status" | jq -r '.ready')
          version=$(echo "$status" | jq -r '.extension_version')

          if [ "$ready" != "true" ] || [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::sconcur is not ready or its version is empty: $status"
            exit 1
          fi

          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Recreate versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"

          # Fully recreate the versioned release so re-pushing the same version refreshes
          # its asset, target commit and date (delete + create; --cleanup-tag moves the
          # tag to the new commit). --latest=false keeps the "Latest" marker off it (it
          # is a semver tag, so gh would otherwise auto-mark it) — the rolling `latest`
          # release below owns that marker.
          gh release delete "$tag" --yes --cleanup-tag || true
          gh release create "$tag" ./ext/build/sconcur.so \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "sconcur extension $tag" \
            --latest=false

      - name: Recreate latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Created last and marked --latest so the rolling `latest` release keeps the
          # GitHub "Latest" marker (what /releases/latest resolves to).
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest ./ext/build/sconcur.so \
            --target "$GITHUB_SHA" \
            --title "Latest Build" \
            --notes "Automatically collected latest version" \
            --latest
