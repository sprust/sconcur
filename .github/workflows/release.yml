name: Build & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Prepare environment
        run: cp .env.example .env

      - name: Build images
        run: make build

      - name: Start containers
        run: make up

      - name: Install composer dependencies
        run: make composer c="install --no-interaction --no-progress"

      - name: Build extension
        run: make ext-build

      - name: Run checks
        run: make check

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Recreate latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest ./ext/build/sconcur.so \
            --target "$GITHUB_SHA" \
            --title "Latest Build" \
            --notes "Automatically collected latest version" \
            --latest
