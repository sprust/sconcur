name: Build & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + all tags: needed to resolve the previous version tag for
          # strict version-to-version release notes.
          fetch-depth: 0

      - name: Prepare environment
        run: cp .env.example .env

      - name: Build images
        run: make build

      - name: Start containers
        run: make up

      - name: Install composer dependencies
        run: make composer c="install --no-interaction --no-progress"

      - name: Build extension
        run: make ext-build

      - name: Run checks
        run: make check

      - name: Resolve release version
        id: version
        run: |
          status=$(docker compose exec -T php php -d extension=./ext/build/sconcur.so bin/sconcur-status --json)
          echo "sconcur-status: $status"

          ready=$(echo "$status" | jq -r '.ready')
          version=$(echo "$status" | jq -r '.extension_version')

          if [ "$ready" != "true" ] || [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::sconcur is not ready or its version is empty: $status"
            exit 1
          fi

          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Recreate versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"

          # Previous version tag = the highest v* tag strictly below the current one, so
          # the notes cover strictly the previous version → this version. Empty on the
          # very first versioned release, where we let --generate-notes fall back to its
          # automatic base. (bkp/latest and other non-v tags are ignored.)
          previous_tag=$( { git tag -l 'v*'; echo "$tag"; } | sort -V -u \
            | awk -v current="$tag" '$0 == current { print previous; exit } { previous = $0 }' )

          notes_args=(--generate-notes)

          if [ -n "$previous_tag" ]; then
            echo "Generating notes from $previous_tag to $tag."
            notes_args+=(--notes-start-tag "$previous_tag")
          else
            echo "No previous version tag found; using automatic notes base."
          fi

          # Fully recreate the versioned release so re-pushing the same version refreshes
          # its asset, target commit and date (delete + create; --cleanup-tag moves the
          # tag to the new commit). --latest marks it as the GitHub "Latest" release
          # (what /releases/latest resolves to). --generate-notes auto-builds the
          # changelog from PRs/commits between previous_tag and this release.
          gh release delete "$tag" --yes --cleanup-tag || true
          gh release create "$tag" ./ext/build/sconcur.so \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            "${notes_args[@]}" \
            --latest
