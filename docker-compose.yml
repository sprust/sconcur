services:
  php:
    container_name: sc-php
    restart: on-failure
    build:
      context: ./docker/php
      args:
        - GROUP_ID=${DOCKER_GROUP_ID}
        - USER_ID=${DOCKER_USER_ID}
    working_dir: /sconcur
    volumes:
      - ./:/sconcur
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Where the HTTP-server feature tests reach the running http-server service.
      - HTTP_SERVER_HOST=http-server
      - HTTP_SERVER_PORT=${HTTP_SERVER_PORT}
    command: ["sh", "-c", "echo \"Starting infinite wait loop...\"; while sleep 1; do :; done"]

  # Runs the HTTP server (reuses the php image build). The port is published to
  # the host via env. Rebuild/restart it with `make http-server-restart`.
  http-server:
    container_name: sc-http-server
    restart: on-failure
    build:
      context: ./docker/php
      args:
        - GROUP_ID=${DOCKER_GROUP_ID}
        - USER_ID=${DOCKER_USER_ID}
    working_dir: /sconcur
    volumes:
      - ./:/sconcur
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - ${HTTP_SERVER_DOCKER_PORT}:${HTTP_SERVER_PORT}
    command: ["sh", "-c", "php -d extension=./ext/build/sconcur.so tests/servers/http/http-server.php 0.0.0.0:${HTTP_SERVER_PORT}"]

  mongodb:
    container_name: sc-mongodb
    image: mongo:8.0.5
    restart: unless-stopped
    command: [ "mongod", "--wiredTigerCacheSizeGB", "1" ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ADMIN_PASSWORD}
    ports:
      - ${MONGO_DOCKER_PORT}:27017
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
    tmpfs:
      - /data/db:rw,noexec,nosuid,size=1024m
      - /data/configdb:rw,noexec,nosuid,size=512m
