services:
  php:
    container_name: sc-php
    restart: on-failure
    build:
      context: ./docker/php
      args:
        - GROUP_ID=${DOCKER_GROUP_ID}
        - USER_ID=${DOCKER_USER_ID}
    working_dir: /sconcur
    volumes:
      - ./:/sconcur
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["sh", "-c", "echo \"Starting infinite wait loop...\"; while sleep 1; do :; done"]

  # Runs both sconcur master servers (HTTP and socket) under supervisor in one
  # container (reuses the php image build). Ports are hardcoded (host 28080->8080
  # for HTTP, 29100->9100 for socket) because the JSON master configs cannot use
  # env vars. Rebuild/recreate it with `make servers-restart`; control each server
  # with `make {http,socket}-server-{status,stop,reload}`.
  servers:
    container_name: sc-servers
    restart: unless-stopped
    build:
      context: ./docker/php
      args:
        - GROUP_ID=${DOCKER_GROUP_ID}
        - USER_ID=${DOCKER_USER_ID}
    working_dir: /sconcur
    volumes:
      - ./:/sconcur
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "28080:8080"
      - "28081:8081"
      - "29100:9100"
      - "29101:9101"
      - "29200:9200"
      - "29201:9201"
    command: ["supervisord", "-c", "/sconcur/docker/servers/config/supervisord.conf"]

  mongodb:
    container_name: sc-mongodb
    image: mongo:8.0.5
    restart: unless-stopped
    command: [ "mongod", "--wiredTigerCacheSizeGB", "1" ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ADMIN_PASSWORD}
    ports:
      - ${MONGO_DOCKER_PORT}:27017
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
    tmpfs:
      - /data/db:rw,noexec,nosuid,size=1024m
      - /data/configdb:rw,noexec,nosuid,size=512m

  mysql:
    container_name: sc-mysql
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - ${MYSQL_DOCKER_PORT}:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s
    tmpfs:
      - /var/lib/mysql:rw,noexec,nosuid,size=1024m

  postgres:
    container_name: sc-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_DOCKER_PORT}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
    tmpfs:
      - /var/lib/postgresql/data:rw,noexec,nosuid,size=1024m
