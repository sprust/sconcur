services:
  php:
    container_name: sc-php
    restart: on-failure
    build:
      context: ./docker/php
      args:
        - GROUP_ID=${DOCKER_GROUP_ID}
        - USER_ID=${DOCKER_USER_ID}
    working_dir: /sconcur
    volumes:
      - ./:/sconcur
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["sh", "-c", "echo \"Starting infinite wait loop...\"; while sleep 1; do :; done"]

  mongodb:
    container_name: sc-mongodb
    image: mongo:8.0.5
    restart: unless-stopped
    command: [ "mongod", "--wiredTigerCacheSizeGB", "5" ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ADMIN_PASSWORD}
      MONGO_ADMIN_USERNAME: ${MONGO_ADMIN_USERNAME}
      MONGO_ADMIN_PASSWORD: ${MONGO_ADMIN_PASSWORD}
    ports:
      - ${MONGO_DOCKER_PORT}:27017
    volumes:
      - ./docker/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongodb:/data/db

  mysql:
    container_name: sc-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - ${MYSQL_DOCKER_PORT}:3306
    tmpfs:
      - /var/lib/mysql
    mem_limit: 1g

volumes:
  mongodb:
    driver: local
